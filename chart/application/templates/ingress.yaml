{{- range .Values.epinio.routes }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "epinio-truncate" (print $.Values.epinio.appName "-" .id) }}
  namespace: {{ $.Release.Namespace | quote }}
  annotations:
    {{- include "epinio-application.annotations" $ | nindent 4 }}
  labels:
    {{- include "epinio-application.labels" $ | nindent 4 }}
spec:
  {{- with $.Values.epinio.ingress }}
  ingressClassName: {{ . | quote }}
  {{- end }}
  {{- with $.Values.userConfig.traefik_entrypoint }}
  entryPoints:
    - {{ . | quote }}
  {{- end }}
  routes:
  - match: Host(`{{ .domain }}`) && PathPrefix(`{{ .path }}`)
    kind: Rule
    services:
    - name: {{ include "epinio-app-service-name" $ }}
      port: 8080
  tls:
    {{- with $.Values.userConfig.traefik_tls_options_name }}
    options:
      name: {{ . | quote }}
      {{- with $.Values.userConfig.traefik_tls_options_namespace }}
      namespace: {{ . | quote }}
      {{- end }}
    {{- end }}
    {{- with $.Values.userConfig.traefik_tls_certResolver }}
    certResolver: {{ . | quote }}
    {{- end }}
    {{- if and (not $.Values.userConfig.traefik_tls_options_name) (not $.Values.userConfig.traefik_tls_certResolver) }}
    {}
    {{- end }}
{{- end }}
