suite: ingress route tests
templates:
  - templates/ingress.yaml
values:
  - required.yaml
tests:
  - it: given no traefik userConfig then should render a bare IngressRoute with empty tls and no entryPoints
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: IngressRoute
      - isAPIVersion:
          of: traefik.io/v1alpha1
      - notExists:
          path: spec.entryPoints
      - equal:
          path: spec.tls
          value: {}
      - notExists:
          path: spec.tls.options
      - notExists:
          path: spec.tls.certResolver
      - matchRegex:
          path: spec.routes[0].match
          pattern: "^Host\\(`app\\.example\\.com`\\) && PathPrefix\\(`/`\\)$"
      - equal:
          path: spec.routes[0].kind
          value: Rule
      - equal:
          path: spec.routes[0].services[0].port
          value: 8080

  - it: given a custom appListeningPort then the route service port should stay 8080 (Service port)
    set:
      userConfig.appListeningPort: 9000
    asserts:
      - equal:
          path: spec.routes[0].services[0].port
          value: 8080

  - it: given epinio.ingress is set then ingressClassName should be set
    set:
      epinio.ingress: traefik-lb
    asserts:
      - equal:
          path: spec.ingressClassName
          value: traefik-lb

  - it: given no epinio.ingress then ingressClassName should not be present
    asserts:
      - notExists:
          path: spec.ingressClassName

  - it: given traefik.entrypoint then entryPoints should be set on the route as a single-item list
    set:
      userConfig.traefik.entrypoint: websecure
    asserts:
      - equal:
          path: spec.entryPoints
          value:
            - websecure

  - it: given traefik.tls.certResolver then tls.certResolver should be set
    set:
      userConfig.traefik.tls.certResolver: letsencrypt
    asserts:
      - equal:
          path: spec.tls.certResolver
          value: letsencrypt

  - it: given traefik.tls.options then tls.options should be set with name and namespace
    set:
      userConfig.traefik.tls.options.name: my-tls-opt
      userConfig.traefik.tls.options.namespace: default
    asserts:
      - equal:
          path: spec.tls.options.name
          value: my-tls-opt
      - equal:
          path: spec.tls.options.namespace
          value: default

  - it: given only tls.options.name then tls.options should contain only the name
    set:
      userConfig.traefik.tls.options.name: my-tls-opt
    asserts:
      - equal:
          path: spec.tls.options.name
          value: my-tls-opt
      - notExists:
          path: spec.tls.options.namespace

  - it: given a route with a path and domain then the match rule should combine Host and PathPrefix
    set:
      epinio.routes:
        - id: r2
          domain: sub.example.com
          path: /api
    asserts:
      - matchRegex:
          path: spec.routes[0].match
          pattern: "Host\\(`sub\\.example\\.com`\\) && PathPrefix\\(`/api`\\)"

  - it: given multiple routes then one IngressRoute document per route should be rendered
    set:
      epinio.routes:
        - id: r1
          domain: a.example.com
          path: /
        - id: r2
          domain: b.example.com
          path: /v2
    asserts:
      - hasDocuments:
          count: 2

  - it: given a route.secret then no Certificate resource should be rendered (secret support dropped)
    set:
      epinio.routes:
        - id: r1
          domain: app.example.com
          path: /
          secret: my-tls-secret
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: IngressRoute
      - notExists:
          path: spec.tls.secretName

  - it: given the chart is rendered then no cert-manager Certificate resource should be present
    asserts:
      - notFailedTemplate: {}